          initialDelaySeconds: 25
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: attendance
  namespace: staging
spec:
  selector:
    app: attendance
    slot: blue
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8081
  type: ClusterIP
---
