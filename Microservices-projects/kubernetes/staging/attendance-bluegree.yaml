apiVersion: apps/v1
kind: Deployment
metadata:
  name: attendance-blue
  namespace: staging
  labels:
    app: attendance
    slot: blue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: attendance
      slot: blue
  template:
    metadata:
      labels:
        app: attendance
        slot: blue
    spec:
      containers:
      - name: attendance
        image: attendance:1.0.0
        imagePullPolicy: Never
        ports:
        - containerPort: 8081
        env:
        - name: MYSQL_HOST
          value: "mysql"
        - name: MYSQL_DATABASE
          value: "attendance_db"
        - name: MYSQL_USER
          value: "root"
        - name: MYSQL_PASSWORD
          value: "password"
        readinessProbe:
          httpGet:
            path: /attendance/healthz
            port: 8081
          initialDelaySeconds: 20
          periodSeconds: 5
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /attendance/healthz
            port: 8081
          initialDelaySeconds: 25
          periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
